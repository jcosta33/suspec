name: method-gates

# Public-surface checks run over the current Suspec repositories. They report documentation
# hygiene failures; adopters choose which checks belong in their own CI.

# Push and PR runs protect this repository's history and current local surfaces. Cross-family checks
# are dispatched with explicit refs because five default branches cannot move atomically.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      skills_ref:
        description: suspec-skills ref for an integration snapshot
        required: false
        default: main
      agents_ref:
        description: suspec-agents ref for an integration snapshot
        required: false
        default: main
      cli_ref:
        description: suspec-cli ref for an integration snapshot
        required: false
        default: main
      mcp_ref:
        description: suspec-mcp ref for an integration snapshot
        required: false
        default: main

permissions:
  contents: read

jobs:
  local-gates:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - { uses: actions/checkout@v4, with: { fetch-depth: 0 } }

      - name: Accepted ADR history
        env:
          SUSPEC_HISTORY_BASE: "${{ github.event.pull_request.base.sha || github.event.before }}"
        run: sh scripts/lint-accepted-adrs.sh

      - name: Current Canon surfaces
        run: |
          sh scripts/lint-product-citations.sh "$(dirname "$GITHUB_WORKSPACE")"
          SUSPEC_FAMILY_ROOTS="$GITHUB_WORKSPACE" sh scripts/lint-count-ranges.sh

  method-gates:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # Check out the selected family under one parent so cross-repo scans share a root.
      - { name: suspec, uses: actions/checkout@v4, with: { path: family/suspec } }
      - { name: suspec-skills, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-skills, ref: "${{ inputs.skills_ref || 'main' }}", path: family/suspec-skills } }
      - { name: suspec-agents, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-agents, ref: "${{ inputs.agents_ref || 'main' }}", path: family/suspec-agents } }
      - { name: suspec-mcp, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-mcp, ref: "${{ inputs.mcp_ref || 'main' }}", path: family/suspec-mcp } }
      - { name: suspec-cli, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-cli, ref: "${{ inputs.cli_ref || 'main' }}", path: family/suspec-cli } }

      - name: Method gates
        run: sh family/suspec/scripts/lint-all.sh "$GITHUB_WORKSPACE/family"
