name: method-gates

# Public-surface checks run over the current Suspec repositories. They report documentation
# hygiene failures; adopters choose which checks belong in their own CI.

# No paths filter on push: the gates lint README/AGENTS and product surfaces, and this repo's
# workflow is commit-direct-to-main — a filtered push would skip the gate exactly when it matters.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  method-gates:
    runs-on: ubuntu-latest
    steps:
      # Check out the current family under one parent so cross-repo scans share a root.
      - { name: suspec,              uses: actions/checkout@v4, with: { repository: jcosta33/suspec,              path: family/suspec } }
      - { name: suspec-skills,       uses: actions/checkout@v4, with: { repository: jcosta33/suspec-skills,       path: family/suspec-skills } }
      - { name: suspec-mcp,          uses: actions/checkout@v4, with: { repository: jcosta33/suspec-mcp,          path: family/suspec-mcp } }
      - { name: suspec-cli,          uses: actions/checkout@v4, with: { repository: jcosta33/suspec-cli,          path: family/suspec-cli } }

      - name: Method gates
        run: sh family/suspec/scripts/lint-all.sh "$GITHUB_WORKSPACE/family"
